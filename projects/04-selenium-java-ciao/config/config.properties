# Application Configuration
base.url=https://ciao.modena.com/id
base.url.api=https://ciao.modena.com/api

# Browser Configuration
default.browser=chrome
headless.mode=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Path Configuration
screenshot.path=reports/screenshots/
report.path=reports/extent-reports/
download.path=downloads/
testdata.path=src/main/resources/testdata/

# Test Data Files
tracking.excel.data=src/main/resources/testdata/tracking_data.xlsx
registration.json.data=src/main/resources/testdata/registration_data.json

# Email Configuration (for reports)
email.enabled=false
email.host=smtp.gmail.com
email.port=587
email.username=your-email@gmail.com
email.password=your-password
email.recipient=test-reports@modena.com

# API Configuration
api.timeout=30
api.retry.count=3